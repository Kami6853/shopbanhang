<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layout/main-layout}">
<body>
	<div layout:fragment="content">
		<div class="container mt-4">

			<h3 class="mb-4 text-center fw-bold">QUẢN LÝ TÀI KHOẢN</h3>
			<form method="get" th:action="@{/admin/accounts}" class="mb-3">
				<div class="input-group">
					<input type="text" name="keyword" th:value="${keyword}"
						class="form-control" placeholder="Tìm theo username hoặc họ tên">

					<button class="btn btn-primary">
						<i class="fa-solid fa-magnifying-glass"></i>
					</button>
				</div>
			</form>

			<!-- ===== ROW CHIA 2 CỘT ===== -->
			<div class="row">

				<!-- ================= TABLE (TRÁI) ================= -->
				<div class="col-md-8">
					<div class="card shadow-sm h-100">
						<div class="card-body">

							<h5 class="mb-3 text-center fw-bold">DANH SÁCH TÀI KHOẢN</h5>

							<table class="table table-bordered table-hover align-middle">
								<thead class="table-dark">
									<tr>
										<th>Username</th>
										<th>Password</th>
										<th>Họ tên</th>
										<th>Email</th>
										<th>Ảnh</th>
										<th>Vai trò</th>
										<th>Trạng thái</th>
										<th style="width: 120px">HĐ</th>
									</tr>
								</thead>

								<tbody>
									<tr th:each="acc : ${items}">
										<td th:text="${acc.username}"></td>
										<td th:text="${acc.password}"></td>
										<td th:text="${acc.fullname}"></td>
										<td th:text="${acc.email}"></td>
										<td class="text-center"><img th:if="${acc.photo != null}"
											th:src="@{/image/{img}(img=${acc.photo})}" width="60"
											height="60"
											style="object-fit: cover; border-radius: 6px; border: 1px solid #ccc">
										</td>

										<td><span th:if="${acc.admin}" class="badge bg-danger">Admin</span>
											<span th:if="${!acc.admin}" class="badge bg-primary">User</span>
										</td>

										<td><span th:if="${acc.activated}"
											class="badge bg-success">Hoạt động</span> <span
											th:if="${!acc.activated}" class="badge bg-secondary">Khóa</span>
										</td>

										<td class="text-center"><a
											th:href="@{/admin/accounts/edit/{username}(username=${acc.username},keyword=${keyword}, page=${page.number})}"
											class="btn btn-sm btn-warning text-white"> <i
												class="fa-solid fa-pen"></i> Sửa
										</a></td>
									</tr>
								</tbody>

							</table>
							<!-- ===== PAGINATION ===== -->
							<nav class="mt-3" th:if="${page.totalPages > 1}">
								<ul class="pagination justify-content-center">

									<li class="page-item"
										th:classappend="${page.first} ? 'disabled'"><a
										class="page-link"
										th:href="@{/admin/accounts(page=0, keyword=${keyword})}">
											<i class="fa-solid fa-angles-left"></i>
									</a></li>

									<li class="page-item"
										th:classappend="${page.first} ? 'disabled'"><a
										class="page-link"
										th:href="@{/admin/accounts(page=${page.number - 1}, keyword=${keyword})}">
											<i class="fa-solid fa-angle-left"></i>
									</a></li>

									<li class="page-item disabled"><span class="page-link">
											Trang [[${page.number + 1}]] / [[${page.totalPages}]] </span></li>

									<li class="page-item"
										th:classappend="${page.last} ? 'disabled'"><a
										class="page-link"
										th:href="@{/admin/accounts(page=${page.number + 1}, keyword=${keyword})}">
											<i class="fa-solid fa-angle-right"></i>
									</a></li>

									<li class="page-item"
										th:classappend="${page.last} ? 'disabled'"><a
										class="page-link"
										th:href="@{/admin/accounts(page=${page.totalPages - 1}, keyword=${keyword})}">
											<i class="fa-solid fa-angles-right"></i>
									</a></li>

								</ul>
							</nav>


						</div>
					</div>
				</div>




				<!-- ================= FORM (PHẢI) ================= -->
				<div class="col-md-4">
					<div class="card mb-4 shadow-sm h-100">
						<div class="card-body">

							<h5 class="mb-3 text-center fw-bold">THÔNG TIN TÀI KHOẢN</h5>

							<form th:object="${item}" method="post"
								enctype="multipart/form-data">

								<!-- USERNAME -->
								<div class="mb-3">
									<label class="form-label fw-bold">Username</label> <input
										th:field="*{username}" class="form-control"
										placeholder="Tên đăng nhập"
										th:readonly="${item.username != null}"> <small
										class="text-danger" th:if="${#fields.hasErrors('username')}"
										th:errors="*{username}"></small>
								</div>

								<!-- PASSWORD -->
								<div class="mb-3">
									<label class="form-label fw-bold">Mật khẩu</label> <input
										type="text" th:field="*{password}" class="form-control"
										placeholder="Nhập mật khẩu"> <small
										class="text-danger" th:if="${#fields.hasErrors('password')}"
										th:errors="*{password}"></small>
								</div>


								<!-- FULLNAME -->
								<div class="mb-3">
									<label class="form-label fw-bold">Họ tên</label> <input
										th:field="*{fullname}" class="form-control"
										placeholder="Nhập họ tên"> <small class="text-danger"
										th:if="${#fields.hasErrors('fullname')}"
										th:errors="*{fullname}"></small>
								</div>


								<!-- EMAIL -->
								<div class="mb-3">
									<label class="form-label fw-bold">Email</label> <input
										th:field="*{email}" type="email" class="form-control"
										placeholder="Nhập email"> <small class="text-danger"
										th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></small>
								</div>


								<!-- PHOTO -->
								<div class="mb-3">
									<label class="form-label fw-bold">Ảnh</label>

									<!-- upload ảnh mới -->
									<input type="file" name="imageFile" class="form-control">

									<!-- ảnh hiện tại -->
									<div class="mt-2" th:if="${item.photo}">
										<img th:src="@{/image/{img}(img=${item.photo})}" width="100"
											height="100"
											style="object-fit: cover; border: 1px solid #ccc">
										<p class="text-muted mb-0">
											Ảnh hiện tại: <span th:text="${item.photo}"></span>
										</p>
									</div>
								</div>


								<!-- ACTIVATED -->
								<div class="mb-3">
									<label class="form-label fw-bold">Kích hoạt</label> <select
										th:field="*{activated}" class="form-select">
										<option value="true">Hoạt động</option>
										<option value="false">Khóa</option>
									</select> <small class="text-danger"
										th:if="${#fields.hasErrors('activated')}"
										th:errors="*{activated}"></small>
								</div>


								<!-- ADMIN -->
								<div class="mb-3">
									<label class="form-label fw-bold">Vai trò</label> <select
										th:field="*{admin}" class="form-select">
										<option value="true">Admin</option>
										<option value="false">User</option>
									</select> <small class="text-danger"
										th:if="${#fields.hasErrors('admin')}" th:errors="*{admin}"></small>
								</div>


								<hr>

								<!-- BUTTONS -->
								<div class="d-flex flex-wrap gap-2 justify-content-center">

									<button formaction="/admin/accounts/create"
										class="btn btn-success">
										<i class="fa-solid fa-plus"></i> Thêm
									</button>

									<button formaction="/admin/accounts/update"
										class="btn btn-warning text-white">
										<i class="fa-solid fa-pen"></i> Cập nhật
									</button>

									<!-- Nếu đã chọn tài khoản -->
									<a th:if="${item.username != null}"
										th:href="@{/admin/accounts/delete/{username}(username=${item.username})}"
										class="btn btn-danger"
										onclick="return confirm('Xóa tài khoản này?')"> <i
										class="fa-solid fa-trash"></i> Xóa
									</a>

									<!-- Nếu chưa chọn -->
									<button th:if="${item.username == null}" type="button"
										class="btn btn-danger"
										onclick="alert('Vui lòng chọn tài khoản cần xóa!')">
										<i class="fa-solid fa-trash"></i> Xóa
									</button>
									<a th:href="@{/admin/accounts}" class="btn btn-secondary">
										<i class="fa-solid fa-rotate"></i> Làm mới
									</a>

								</div>

							</form>

						</div>
					</div>
				</div>

			</div>
		</div>
		<div th:if="${success}">
			<script>
				alert('[[${success}]]');
			</script>
		</div>
	</div>
</body>
</html>
