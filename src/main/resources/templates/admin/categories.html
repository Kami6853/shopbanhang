<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layout/main-layout}">
<body>
	<div layout:fragment="content">

		<div class="container mt-4">

			<h3 class="mb-4 text-center fw-bold">QUẢN LÝ LOẠI SẢN PHẨM</h3>


			<form method="get" th:action="@{/admin/categories}" class="mb-3">
				<div class="input-group">
					<input type="text" name="keyword" th:value="${keyword}"
						class="form-control" placeholder="Tìm theo mã hoặc tên loại">

					<button class="btn btn-primary">
						<i class="fa-solid fa-magnifying-glass"></i>
					</button>
				</div>
			</form>

			<!-- ===== ROW CHIA 2 CỘT ===== -->
			<div class="row">

				<!-- ================= TABLE (PHẢI) ================= -->
				<div class="col-md-7">

					<div class="card shadow-sm h-100">
						<div class="card-body">

							<h5 class="mb-3 text-center fw-bold">DANH SÁCH LOẠI SẢN PHẨM
							</h5>

							<table class="table table-bordered table-hover align-middle">
								<thead class="table-dark">
									<tr>
										<th>Mã loại</th>
										<th>Tên loại</th>
										<th style="width: 120px">Hành động</th>
									</tr>
								</thead>

								<tbody>
									<th:block th:each="item : ${items}">
										<tr>
											<td th:text="${item.id}"></td>
											<td th:text="${item.name}"></td>
											<td class="text-center"><a
												th:href="@{/admin/categories/edit/{id}(id=${item.id}, keyword=${keyword}, page=${page.number})}"
												class="btn btn-sm btn-warning text-white"> <i
													class="fa-solid fa-pen"></i> Sửa
											</a></td>
										</tr>
									</th:block>
								</tbody>

							</table>
							<nav class="mt-3" th:if="${page.totalPages > 1}">
								<ul class="pagination justify-content-center">

									<li class="page-item"
										th:classappend="${page.first} ? 'disabled'"><a
										class="page-link"
										th:href="@{/admin/categories(page=0, keyword=${keyword})}">
											« </a></li>

									<li class="page-item"
										th:classappend="${page.first} ? 'disabled'"><a
										class="page-link"
										th:href="@{/admin/categories(page=${page.number - 1}, keyword=${keyword})}">
											‹ </a></li>

									<li class="page-item disabled"><span class="page-link">
											Trang [[${page.number + 1}]] / [[${page.totalPages}]] </span></li>

									<li class="page-item"
										th:classappend="${page.last} ? 'disabled'"><a
										class="page-link"
										th:href="@{/admin/categories(page=${page.number + 1}, keyword=${keyword})}">
											› </a></li>

									<li class="page-item"
										th:classappend="${page.last} ? 'disabled'"><a
										class="page-link"
										th:href="@{/admin/categories(page=${page.totalPages - 1}, keyword=${keyword})}">
											» </a></li>

								</ul>
							</nav>


						</div>
					</div>

				</div>


				<!-- ================= FORM (TRÁI) ================= -->
				<div class="col-md-5">

					<div class="card mb-4 shadow-sm h-100">
						<div class="card-body">

							<h5 class="mb-3 text-center fw-bold">THÔNG TIN LOẠI</h5>

							<form th:object="${item}" method="post">

								<div class="mb-3">
									<label class="form-label fw-bold">Mã loại</label> <input
										th:field="*{id}" class="form-control"
										placeholder="VD: CF, TEA" th:readonly="*{id != null}">
									<small class="text-danger" th:if="${#fields.hasErrors('id')}"
										th:errors="*{id}"></small>
								</div>

								<div class="mb-3">
									<label class="form-label fw-bold">Tên loại</label> <input
										th:field="*{name}" class="form-control"
										placeholder="VD: Cà phê"> <small class="text-danger"
										th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></small>
								</div>

								<hr>

								<div class="d-flex flex-wrap gap-2 justify-content-center">

									<button formaction="/admin/categories/create"
										class="btn btn-success">
										<i class="fa-solid fa-plus"></i> Thêm
									</button>

									<a th:if="${item.id != null}"
										th:href="@{/admin/categories/delete/{id}(id=${item.id})}"
										class="btn btn-danger"
										onclick="return confirm('Xóa loại này?')"> <i
										class="fa-solid fa-trash"></i> Xóa
									</a>

									<button th:if="${item.id == null}" type="button"
										class="btn btn-danger"
										onclick="alert('Vui lòng chọn loại sản phẩm cần xóa!')">
										<i class="fa-solid fa-trash"></i> Xóa
									</button>

									<button formaction="/admin/categories/update"
										class="btn btn-warning text-white">
										<i class="fa-solid fa-pen"></i> Cập nhật
									</button>

									<a th:href="@{/admin/categories}" class="btn btn-secondary">
										<i class="fa-solid fa-rotate"></i> Làm mới
									</a>

								</div>

							</form>

						</div>
					</div>

				</div>

			</div>

		</div>
		<script th:if="${success}">
			alert('[[${success}]]');
		</script>

		<script th:if="${error}">
			alert('[[${error}]]');
		</script>
	</div>
</body>
</html>
