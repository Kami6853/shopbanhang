<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layout/main-layout}">
<body>

	<div layout:fragment="content">

		<!-- ===== HEADER ===== -->
		<div class="container my-5 text-center">
			<h2 class="fw-bold text-uppercase">
				<i class="fa-solid fa-receipt me-2"></i>Đơn hàng của tôi
			</h2>
			<p class="text-muted">Danh sách các đơn hàng bạn đã đặt</p>
		</div>

		<div class="container mb-5">

			<!-- KHÔNG CÓ ĐƠN -->
			<div th:if="${#lists.isEmpty(orders)}"
				class="text-center text-muted py-5">
				<i class="fa-solid fa-box-open fa-3x mb-3"></i>
				<h5>Hiện tại bạn chưa có đơn hàng nào</h5>
				<a th:href="@{/products/list}" class="btn btn-outline-primary mt-3">
					<i class="fa-solid fa-store me-1"></i> Tiếp tục mua sắm
				</a>
			</div>

			<!-- CÓ ĐƠN -->
			<div th:if="${!#lists.isEmpty(orders)}">
				<div class="col-lg-8 mx-auto">

					<div th:each="o : ${orders}"
						class="card mb-3 shadow-sm border-0 rounded-4">

						<!-- HEADER ĐƠN -->
						<div
							class="card-body d-flex justify-content-between align-items-center">
							<div>
								<h6 class="fw-bold mb-1">
									Đơn hàng #<span th:text="${o.id}"></span>
								</h6>
								<small class="text-muted"> Ngày đặt: <span
									th:text="${#temporals.format(o.createDate,'dd/MM/yyyy')}"></span>
								</small>
							</div>

							<button class="btn btn-outline-primary btn-sm"
								data-bs-toggle="collapse"
								th:data-bs-target="'#detail-' + ${o.id}">
								<i class="fa-solid fa-eye me-1"></i> Xem chi tiết
							</button>
						</div>

						<!-- CHI TIẾT ĐƠN -->
						<div class="collapse" th:id="'detail-' + ${o.id}">
							<div class="card-body border-top bg-light rounded-bottom-4">

								<table class="table table-sm align-middle mb-0">
									<thead class="table-secondary">
										<tr>
											<th>Sản phẩm</th>
											<th class="text-center">Số lượng</th>
											<th class="text-end">Đơn giá</th>
											<th class="text-end">Thành tiền</th>
										</tr>
									</thead>
									<tbody>
										<tr th:each="d : ${orderDetailsMap[o.id]}">
											<td th:text="${d.products.name}"></td>
											<td class="text-center" th:text="${d.quantity}"></td>
											<td class="text-end"
												th:text="${#numbers.formatDecimal(d.price,0,'COMMA',0,'POINT')} + ' ₫'"></td>
											<td class="text-end"
												th:text="${#numbers.formatDecimal(d.price * d.quantity,0,'COMMA',0,'POINT')} + ' ₫'"></td>
										</tr>
									</tbody>
								</table>

							</div>
						</div>

					</div>
				</div>
			</div>

		</div>
	</div>

</body>
</html>
