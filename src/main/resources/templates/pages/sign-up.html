<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layout/main-layout}">
<body>

	<div layout:fragment="content"
		class="d-flex justify-content-center align-items-center"
		style="min-height: 65vh;">

		<div class="card shadow-sm p-4" style="width: 100%; max-width: 450px;">

			<h4 class="text-center mb-4 fw-bold text-uppercase">Đăng ký tài
				khoản</h4>

			<form th:action="@{/account/sign-up}" method="post"
				th:object="${item}" enctype="multipart/form-data">
				<div th:if="${error}" class="alert alert-danger">[[${error}]]</div>
				<!-- ẢNH ĐẠI DIỆN PREVIEW -->
				<div class="text-center mb-3">
					<img id="previewImage" th:src="@{/image/user.png}"
						class="rounded-circle border" width="120" height="120"
						style="object-fit: cover;">
				</div>
				<div class="mb-3">
					<label class="form-label">Ảnh đại diện</label> <input type="file"
						class="form-control" name="imageFile" accept="image/*"
						onchange="previewAvatar(this)">
				</div>
				<div class="mb-3">
					<label class="form-label">Tên đăng nhập</label> <input type="text"
						class="form-control" placeholder="Nhập tên đăng nhập"
						th:field="*{username}"> <small class="text-danger"
						th:errors="*{username}"></small>
				</div>

				<div class="mb-3">
					<label class="form-label">Mật khẩu</label> <input type="password"
						class="form-control" placeholder="Nhập mật khẩu"
						th:field="*{password}"> <small class="text-danger"
						th:errors="*{password}"></small>

				</div>

				<div class="mb-3">
					<label class="form-label">Họ và tên</label> <input type="text"
						class="form-control" placeholder="Nhập họ tên"
						th:field="*{fullname}"> <small class="text-danger"
						th:errors="*{fullname}"></small>

				</div>

				<div class="mb-3">
					<label class="form-label">Email</label> <input type="email"
						class="form-control" placeholder="Nhập email" th:field="*{email}">
					<small class="text-danger" th:errors="*{email}"></small>

				</div>
				<button class="btn btn-success w-100 fw-semibold">Đăng ký</button>
			</form>


			<div class="text-center mt-3">
				<small class="text-muted"> Đã có tài khoản? <a
					th:href="@{/auth/login}" class="text-decoration-none fw-semibold">
						Đăng nhập </a>
				</small>
			</div>
		</div>
	</div>
</body>
</html>
